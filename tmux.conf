
# run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Keyboard zen: fully disable the mouse, but counterintuitively we keep
# `mouse on`. With mouse reporting ON, alacritty sends real mouse events
# (clicks/drags/wheel) to tmux instead of falling back to alternate-scroll
# mode, which would translate the wheel into arrow keys (indistinguishable
# from real arrows, scrolling shell history). We then unbind every mouse
# event in the root table so all of it does nothing.
# (Shift+drag still bypasses tmux for native alacritty selection/copy.)
set -g mouse on
unbind -n WheelUpPane
unbind -n WheelDownPane
unbind -n WheelUpStatus
unbind -n WheelDownStatus
unbind -n MouseDown1Pane
unbind -n MouseDown1Status
unbind -n MouseDown2Pane
unbind -n MouseDown3Pane
unbind -n MouseDown3Status
unbind -n MouseDown3StatusLeft
unbind -n MouseDrag1Pane
unbind -n MouseDrag1Border
unbind -n DoubleClick1Pane
unbind -n TripleClick1Pane
unbind -n M-MouseDown3Pane
unbind -n M-MouseDown3Status
unbind -n M-MouseDown3StatusLeft
# Copy-mode (scrollback) has its own key table with separate mouse bindings,
# so the root-table unbinds above don't reach it. Strip them here too.
unbind -T copy-mode-vi MouseDown1Pane
unbind -T copy-mode-vi MouseDrag1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane
unbind -T copy-mode-vi WheelUpPane
unbind -T copy-mode-vi WheelDownPane
unbind -T copy-mode-vi DoubleClick1Pane
unbind -T copy-mode-vi TripleClick1Pane
# set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1

set-option -g @minimal-tmux-fg "#1e1e2e"
set-option -g @minimal-tmux-bg "#cba6f7"
set-option -g @minimal-tmux-left false
set-option -g @minimal-tmux-status-right "#S"
set-option -g @minimal-tmux-use-arrow true
set-option -g @minimal-tmux-right-arrow ""
set-option -g @minimal-tmux-left-arrow ""

# recommended for pi: https://pi.dev/docs/latest/tmux
set-option -g extended-keys on

run ~/.config/tmux/plugins/minimal-tmux-status/minimal.tmux

unbind C-b
set -g prefix c-Space
bind c-Space send-prefix
bind x kill-pane

bind q clear-history

# sets iterm window title
set-option -g set-titles on

set-option -g focus-events on

set-window-option -g mode-keys vi

set-option -g history-limit 1000000

bind -T prefix C-b copy-mode

# improve repsonsiveness of escape
set-option -g escape-time 10

# split horizontally to semicolon
unbind ";"
bind ";" split-window -hb -c "#{pane_current_path}" \; select-layout -E

# Keep panes evenly distributed after split
bind "'" split-window -v -c "#{pane_current_path}" \; select-layout -E

# new windows inherit the current pane's directory
bind c new-window -c "#{pane_current_path}"

# open claude in a window named "claude" that stays named claude
# (claude reports its version as the process title, which automatic-rename
# would otherwise copy into the window name, breaking code-bridge.nvim)
bind C new-window -c "#{pane_current_path}" -n claude \; set-window-option automatic-rename off \; send-keys 'claude' Enter

# Rebalance panes automatically on window resize - preserves vertical layout
set-hook -g client-resized 'select-layout -E'
set-hook -g pane-exited 'select-layout -E'

# vim-like pane resizing  
bind -r C-k resize-pane -U
bind -r C-j resize-pane -D
bind -r C-h resize-pane -L
bind -r C-l resize-pane -R

# vim-like pane switching
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R
bind O select-pane -t :.-

# unbind keys from above
unbind Up
unbind Down
unbind Left
unbind Right
unbind C-Up
unbind C-Down
unbind C-Left
unbind C-Right

